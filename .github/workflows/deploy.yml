name: Deploy to Production & Release

on:
  push:
    branches:
      - main

# Permissions nécessaires pour créer des releases et tags
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.vars.outputs.sha }}
      commit_msg: ${{ steps.vars.outputs.msg }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour l'historique des commits

      - name: Set Output Variables
        id: vars
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      - name: Install rsync & sshpass
        run: sudo apt-get install -y rsync sshpass

      - name: Deploy via rsync
        run: |
          sshpass -p "1504" rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='*.log' \
            --exclude='inc/uploads/avatars/*.webp' \
            --exclude='inc/uploads/avatars/*.png' \
            --exclude='inc/uploads/avatars/*.jpg' \
            -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10" \
            ./ \
            root@5.48.143.126:/var/www/orinheberge/

      - name: Post-deploy (composer, permissions, reload)
        run: |
          sshpass -p "1504" ssh -o StrictHostKeyChecking=no \
            root@5.48.143.126 bash -s <<'REMOTE'
          cd /var/www/orinheberge
          composer install --no-dev --optimize-autoloader --no-interaction
          chown -R www-data:www-data /var/www/orinheberge
          chmod -R 755 /var/www/orinheberge
          chmod -R 775 /var/www/orinheberge/inc/uploads/
          for svc in nginx apache2 php8.4-fpm php8.3-fpm php8.2-fpm php8.1-fpm php-fpm; do
              systemctl is-active --quiet "$svc" 2>/dev/null && systemctl reload "$svc" && echo "✅ $svc rechargé" || true
          done
          exit 0
          REMOTE

  release_and_notify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Optionnel: préfixe du tag, ex: v
          tag_prefix: "v"
          # Utilise la convention semver par défaut, ou custom_release_rules si besoin

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          release_name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: |
            ## 🚀 Déploiement automatique
            
            **Commit:** ${{ needs.deploy.outputs.commit_sha }}
            **Message:** ${{ needs.deploy.outputs.commit_msg }}
            
            ### Changelog récent :
            $(git log ${{ steps.tag_version.outputs.previous_tag }}..HEAD --pretty=format:"- %s (%h)" --reverse)
          draft: false
          prerelease: false

      - name: Notify Discord
        env:
          RELEASE_TAG: ${{ steps.tag_version.outputs.new_tag }}
          RELEASE_URL: ${{ steps.create_release.outputs.html_url }}
          COMMIT_MSG: ${{ needs.deploy.outputs.commit_msg }}
        run: |
          # Construction du payload JSON pour Discord
          PAYLOAD=$(jq -n \
            --arg title "🚀 Déploiement Production Réussi" \
            --arg desc "Version **${RELEASE_TAG}** déployée avec succès." \
            --arg url "${RELEASE_URL}" \
            --arg commit "${COMMIT_MSG}" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 3066993,
                fields: [
                  { name: "Dernier Commit", value: $commit },
                  { name: "Lien Release", value: $url }
                ],
                footer: { text: "GitHub Actions Auto-Deploy" },
                timestamp: now
              }]
            }')

          # Envoi via curl
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "https://discord.com/api/webhooks/1524238769840980160/sNNABegm9f1yTX8lMAkSux3itd0Kqg3hf8ZHMOsZIYYQzfpXXwv_1HjDfZC39SkF2Izc"