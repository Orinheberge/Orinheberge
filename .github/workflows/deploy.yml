name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.48.143.126
          username: root
          password: "1504"
          script: |
            cd /var/www/html
            git pull https://neyrix_mc:1504@github.com/Orinheberge/Orinheberge.git main
            composer install --no-dev --optimize-autoloader --no-interaction
            chown -R www-data:www-data /var/www/html
            chmod -R 755 /var/www/html
            chmod -R 775 /var/www/html/inc/uploads/
            for svc in nginx apache2 php8.4-fpm php8.3-fpm php8.2-fpm php8.1-fpm php-fpm; do
              systemctl is-active --quiet "$svc" 2>/dev/null && systemctl reload "$svc" && echo "✅ $svc rechargé"
            done
